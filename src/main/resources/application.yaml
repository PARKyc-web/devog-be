spring:
  application:
    name: devog-be

  # Devtool Properties
  devtools:
    restart:
      enabled: false

  # Use Docker Postgre Database
  datasource:
    url: jdbc:postgresql://localhost:5432/postgre
    username: postgre
    password: postgre
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Keys Properties
# Key Must exclude to Commit
keys:
  jjwt: jjwt-token-more-than-32-bit-!@#$%^&*()

jwt:
  expire:
    access: 1800000
    refresh: 2592000000